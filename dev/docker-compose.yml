# ACME Corporation Local Dev Environment
#
# PostgreSQL + SeaweedFS for testing the portal and admin UI against real API endpoints.
# The Go binary handles all schema migrations on startup.
#
# Usage:
#   make dev-up     # start services, wait for healthy
#   make dev-down   # stop and remove volumes

services:
  postgres:
    image: postgres:16-alpine
    container_name: acme-dev-postgres
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_secret
      POSTGRES_DB: mcp_platform
    ports:
      - "5432:5432"
    volumes:
      - acme_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d mcp_platform"]
      interval: 3s
      timeout: 3s
      retries: 10

  seaweedfs:
    image: chrislusf/seaweedfs:latest
    container_name: acme-dev-seaweedfs
    command: 'server -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json -dir=/data -volume.max=5'
    ports:
      - "9000:8333"
    volumes:
      - acme_seaweed_data:/data
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8333"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  acme_postgres_data:
  acme_seaweed_data:
