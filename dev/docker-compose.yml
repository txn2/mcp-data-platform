# ACME Corporation Local Dev Environment
#
# PostgreSQL + SeaweedFS for testing the portal and admin UI against real API endpoints.
# The Go binary handles all schema migrations on startup.
#
# Usage:
#   make dev-up     # start services, wait for healthy
#   make dev-down   # stop and remove volumes

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: acme-dev-postgres
    environment:
      POSTGRES_USER: platform
      POSTGRES_PASSWORD: platform_secret
      POSTGRES_DB: mcp_platform
    ports:
      - "5432:5432"
    volumes:
      - acme_postgres_data:/var/lib/postgresql/data
      # Init script creates the mcp_test and apitest databases used by the
      # mcp-test and api-test fixtures. Runs once on first startup against
      # a fresh data volume; `make dev-down` removes the volume so the
      # next `make dev` re-applies it.
      - ./fixtures/postgres-init.sql:/docker-entrypoint-initdb.d/01-fixture-dbs.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platform -d mcp_platform"]
      interval: 3s
      timeout: 3s
      retries: 10

  # mcp-test: deterministic MCP fixture used by `make dev` to exercise
  # the platform's mcp-gateway connector against a real upstream.
  # dev/start.sh registers this as the `mcp-test-fixture` MCP connection
  # so its 12 tools (identity / data / failure / streaming) appear in
  # the platform's tools/list as `mcp-test-fixture__*`.
  #
  # Anonymous mode (no OIDC); the platform sends MCPTEST_DEV_KEY as
  # X-API-Key. Open http://localhost:9281/portal/ to inspect every call
  # the platform made (audit log + portal SPA).
  mcp-test:
    image: ghcr.io/plexara/mcp-test:v1.2.0@sha256:85b1d6af2b45a6a4dd9fc9d5278ad5bfdc642b258dfab52600851c26d77c74b7
    container_name: acme-dev-mcp-test
    environment:
      MCPTEST_DATABASE_URL: postgres://platform:platform_secret@postgres:5432/mcp_test?sslmode=disable
      MCPTEST_DEV_KEY: ${MCPTEST_DEV_KEY:-mcptest-dev-key-2024}
      MCPTEST_COOKIE_SECRET: ${MCPTEST_COOKIE_SECRET:-mcptest-dev-cookie-secret-please-change-32b}
    command: ["--config", "/app/configs/mcp-test.yaml"]
    volumes:
      - ./fixtures/mcp-test.yaml:/app/configs/mcp-test.yaml:ro
    ports:
      - "127.0.0.1:9281:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # api-test: deterministic HTTP fixture for the platform's apigateway
  # toolkit. dev/start.sh registers this as the `api-test-fixture` api
  # connection so `api_invoke_endpoint` / `api_list_endpoints` /
  # `api_export` have a working upstream out of the box.
  #
  # Anonymous mode (no OIDC); the platform sends APITEST_DEV_KEY as
  # X-API-Key. Open http://localhost:9282/portal/ to inspect every call
  # the platform made.
  api-test:
    image: ghcr.io/plexara/api-test:v1.1.0@sha256:0a2b5d255f54243525a49a6b5c62b88c52c9e34e157e160de97d303dddb4b19b
    container_name: acme-dev-api-test
    environment:
      APITEST_DB_URL: postgres://platform:platform_secret@postgres:5432/apitest?sslmode=disable
      APITEST_DEV_KEY: ${APITEST_DEV_KEY:-apitest-dev-key-2024}
      APITEST_COOKIE_SECRET: ${APITEST_COOKIE_SECRET:-apitest-dev-cookie-secret-please-change-32b}
    command: ["--config", "/app/configs/api-test.yaml"]
    volumes:
      - ./fixtures/api-test.yaml:/app/configs/api-test.yaml:ro
    ports:
      - "127.0.0.1:9282:8080"
    depends_on:
      postgres:
        condition: service_healthy

  # Keycloak: real OIDC + OAuth 2.1 IdP backing both:
  #   - operator portal login (auth.oidc + browser_session in platform.yaml)
  #   - the pre-seeded oauth-mcp-dev / oauth-api-dev connection fixtures
  # Realm + clients + dev users come from ./keycloak-realm.json, imported
  # on first boot. Re-runs of `make dev` re-use the existing realm; only
  # `make dev-down` (which removes the postgres volume) resets it.
  keycloak:
    image: quay.io/keycloak/keycloak:25.0.6@sha256:82c5b7a110456dbd42b86ea572e728878549954cc8bd03cd65410d75328095d2
    container_name: acme-dev-keycloak
    command: ["start-dev", "--import-realm", "--http-port=8080"]
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: platform
      KC_DB_PASSWORD: platform_secret
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME: localhost
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "127.0.0.1:9090:8080"
    volumes:
      - ./keycloak-realm.json:/opt/keycloak/data/import/mcp-platform.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /realms/mcp-platform/.well-known/openid-configuration HTTP/1.0\\r\\n\\r\\n' >&3 && grep -q 200 <&3"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 30s

  seaweedfs:
    image: chrislusf/seaweedfs:3.88@sha256:98e034880fed76fdf508b20cae9de57b0e1f93f5910c89a94fe936af91c59abe
    container_name: acme-dev-seaweedfs
    command: 'server -s3 -s3.port=8333 -s3.config=/etc/seaweedfs/s3.json -dir=/data -volume.max=5'
    ports:
      - "9000:8333"
    volumes:
      - acme_seaweed_data:/data
      - ./seaweedfs-s3.json:/etc/seaweedfs/s3.json:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8333"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Prometheus: scrapes the platform's /metrics endpoint (OTEL_METRICS_ADDR
  # on the host, pinned to :9464 by dev/start.sh) so the portal's admin
  # "API Gateway" activity tab has a real data source via the platform's
  # authenticated PromQL proxy (observability.prometheus in platform.yaml).
  # Dev-only; production scrapes the platform through its own monitoring
  # stack. host.docker.internal lets this container reach the host-run
  # platform; extra_hosts maps it on Linux engines too.
  prometheus:
    image: prom/prometheus:v3.1.0@sha256:6559acbd5d770b15bb3c954629ce190ac3cbbdb2b7f1c30f0385c4e05104e218
    container_name: acme-dev-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=2h"
    ports:
      - "127.0.0.1:9091:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  acme_postgres_data:
  acme_seaweed_data:
