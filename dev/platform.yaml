# ACME Corporation — Local Dev Configuration
#
# Usage:
#   make dev-up
#   go run ./cmd/mcp-data-platform --config dev/platform.yaml
#
# Then in another terminal:
#   cd ui && npm run dev
#   Open http://localhost:5173/portal/

apiVersion: v1

config_store:
  mode: database

server:
  name: acme-data-platform
  transport: http
  address: ":8080"
  description: |
    ACME Corp's unified data platform providing governed access to the enterprise
    data warehouse (Trino/Iceberg), data catalog (DataHub), and object storage (S3).

    ## Available Data Domains

    - **Retail Analytics** — daily sales, store performance, regional trends
    - **Inventory Management** — stock levels, reorder alerts, warehouse utilization
    - **Financial Reporting** — revenue, margins, year-over-year comparisons
    - **Customer Insights** — segmentation, lifetime value, churn indicators

    ## Data Governance

    All data access is governed by the semantic layer. Business definitions,
    ownership, quality scores, and lineage are automatically surfaced alongside
    query results. Deprecated datasets include warnings and migration guidance.
  agent_instructions: |
    You are an AI assistant with access to ACME Corp's enterprise data platform.
    Follow these guidelines when helping users:

    ## Discovery First

    Always start by searching the data catalog (DataHub) before writing queries.
    Use `datahub_search` to find relevant datasets, then `datahub_get_entity` to
    understand schema, ownership, and quality scores before querying.

    ## Query Best Practices

    - Prefer aggregations over full table scans
    - Always include date filters to avoid unbounded queries
    - Use `LIMIT` when exploring unfamiliar tables
    - Reference the `iceberg` catalog for production data

    ## Communication Style

    - Present results with business context, not just raw numbers
    - Flag data quality warnings proactively
    - Suggest related analyses the user might find valuable
    - Use markdown tables for structured results

auth:
  oidc:
    enabled: false
  api_keys:
    enabled: true
    keys:
      - key: "acme-dev-key-2024"
        name: "admin"
        email: "admin@example.com"
        roles: ["admin"]
      - key: "acme-analyst-key"
        name: "analyst"
        email: "rachel.thompson@example.com"
        roles: ["inventory_analyst"]
      - key: "acme-engineer-key"
        name: "engineer"
        email: "marcus.johnson@example.com"
        roles: ["data_engineer"]
      - key: "acme-director-key"
        name: "director"
        email: "david.park@example.com"
        roles: ["regional_director"]

oauth:
  enabled: false

database:
  dsn: "postgres://platform:platform_secret@localhost:5432/mcp_platform?sslmode=disable"
  max_open_conns: 10

# Six ACME personas
personas:
  admin:
    display_name: "Administrator"
    roles:
      - admin
    tools:
      allow:
        - "*"
      deny: []
    context:
      description_prefix: |
        You are the ACME data platform administrator with full access.

  data-engineer:
    display_name: "Data Engineer"
    roles:
      - data_engineer
    tools:
      allow:
        - "trino_*"
        - "datahub_*"
        - "s3_*"
      deny:
        - "s3_delete_*"
    context:
      description_prefix: |
        You are helping an ACME data engineer build and maintain data pipelines.
      agent_instructions_suffix: |
        Use iceberg catalog for production tables.
        Search the catalog before writing new queries.

  inventory-analyst:
    display_name: "Inventory Analyst"
    roles:
      - inventory_analyst
    tools:
      allow:
        - "trino_query"
        - "trino_describe_table"
        - "trino_browse"
        - "datahub_search"
        - "datahub_get_entity"
        - "datahub_get_schema"
        - "s3_list_*"
      deny: []
    context:
      description_prefix: |
        You are helping an ACME inventory analyst track stock levels across 1,000 stores.
        Focus on the inventory and retail schemas.
      agent_instructions_suffix: |
        Start with inventory.inventory_levels for current stock.
        Check metadata before joining tables.

  regional-director:
    display_name: "Regional Director"
    roles:
      - regional_director
    tools:
      allow:
        - "trino_query"
        - "trino_describe_table"
        - "datahub_search"
        - "datahub_get_entity"
        - "s3_list_objects"
        - "s3_get_object"
      deny: []
    context:
      description_prefix: |
        You are providing regional performance data to an ACME regional director.
        Focus on the analytics schema and regional reports.

  finance-executive:
    display_name: "Finance Executive"
    roles:
      - finance_executive
    tools:
      allow:
        - "datahub_search"
        - "datahub_get_entity"
        - "datahub_get_schema"
        - "s3_list_objects"
        - "s3_get_object"
      deny: []
    context:
      description_prefix: |
        You are providing financial insights to an ACME executive.
        Focus on revenue, margins, and high-level KPIs. Avoid technical details.

  store-manager:
    display_name: "Store Manager"
    roles:
      - store_manager
    tools:
      allow:
        - "trino_query"
        - "trino_describe_table"
        - "datahub_search"
        - "s3_get_object"
      deny: []
    context:
      description_prefix: |
        You are helping an ACME store manager access store-level data.
        Focus on daily sales, inventory, and employee scheduling.

  default_persona: inventory-analyst

  role_mapping:
    oidc_to_persona:
      "dp_admin": "admin"
      "dp_data_engineer": "data-engineer"
      "dp_inventory_analyst": "inventory-analyst"
      "dp_regional_director": "regional-director"
      "dp_finance_executive": "finance-executive"
      "dp_store_manager": "store-manager"
    user_personas:
      "sarah.chen@example.com": "admin"
      "marcus.johnson@example.com": "data-engineer"
      "amanda.lee@example.com": "data-engineer"
      "lisa.chang@example.com": "data-engineer"
      "rachel.thompson@example.com": "inventory-analyst"
      "emily.watson@example.com": "inventory-analyst"
      "david.park@example.com": "regional-director"
      "carlos.rodriguez@example.com": "regional-director"
      "jennifer.martinez@example.com": "finance-executive"
      "brian.taylor@example.com": "finance-executive"
      "kevin.wilson@example.com": "store-manager"
      "mike.davis@example.com": "store-manager"

# Toolkits: connect to remote ACME demo backends when env vars are set,
# otherwise fall back to local-only (S3 via SeaweedFS, no Trino/DataHub).
toolkits:
  trino:
    enabled: ${TRINO_ENABLED:-false}
    instances:
      acme:
        host: "${TRINO_HOST:-localhost}"
        port: ${TRINO_PORT:-8080}
        user: "${TRINO_USER:-}"
        password: "${TRINO_PASSWORD:-}"
        catalog: "warehouse"
        schema: "public"
        ssl: ${TRINO_SSL:-false}
        description: "ACME demo Trino — warehouse and opensearch catalogs"
        datahub_source_name: "trino"
    config:
      default_limit: 1000
      max_limit: 10000
      read_only: true
      progress_enabled: true

  datahub:
    enabled: ${DATAHUB_ENABLED:-false}
    instances:
      acme:
        endpoint: "${DATAHUB_ENDPOINT:-http://localhost:8080}"
        token: "${DATAHUB_TOKEN:-}"
        read_only: true
    default: acme

  s3:
    instances:
      dev-s3:
        enabled: true
        endpoint: "http://localhost:9000"
        region: "us-east-1"
        access_key_id: "dev-access-key"
        secret_access_key: "dev-secret-key"
        force_path_style: true
        description: "Local SeaweedFS for portal assets and dev content"

# Providers: use datahub when available, noop otherwise
semantic:
  provider: "${SEMANTIC_PROVIDER:-noop}"
  instance: acme

query:
  provider: "${QUERY_PROVIDER:-noop}"
  instance: acme

injection:
  trino_semantic_enrichment: true
  datahub_query_enrichment: true
  # column_context_filtering: true   # Default: true

tuning:
  rules:
    require_datahub_check: true
    warn_on_deprecated: true
    quality_threshold: 0.7

portal:
  enabled: true
  public_base_url: "http://localhost:8080"
  s3_connection: dev-s3
  s3_bucket: portal-assets

knowledge:
  enabled: true
  apply:
    enabled: true
    require_confirmation: true

admin:
  enabled: true
  persona: admin
  path_prefix: /api/v1/admin

audit:
  enabled: true
  log_tool_calls: true
  retention_days: 90
