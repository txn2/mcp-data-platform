host: localhost:8080
info:
  contact: {}
  description: |-
    Administrative REST API for managing the MCP Data Platform.
    Endpoints cover system info, configuration, personas, auth keys, audit logs, and knowledge management.
  title: MCP Data Platform Admin API
  version: "1.0"
paths:
  /audit/events:
    get:
      description: Returns paginated audit events with optional filtering.
      parameters:
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by tool name
        in: query
        name: tool_name
        type: string
      - description: Filter by MCP session ID
        in: query
        name: session_id
        type: string
      - description: Filter by success/failure
        in: query
        name: success
        type: boolean
      - description: Events after this time (RFC 3339)
        in: query
        name: start_time
        type: string
      - description: Events before this time (RFC 3339)
        in: query
        name: end_time
        type: string
      - description: 'Sort column (default: timestamp)'
        in: query
        name: sort_by
        type: string
      - description: 'Sort direction: asc, desc (default: desc)'
        in: query
        name: sort_order
        type: string
      - description: 'Page number, 1-based (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 50)'
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.auditEventResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List audit events
      tags:
      - Audit
  /audit/events/{id}:
    get:
      description: Returns a single audit event by ID.
      parameters:
      - description: Audit event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.Event'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/admin.problemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
