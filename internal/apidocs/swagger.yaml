host: localhost:8080
info:
  contact: {}
  description: REST API for the MCP Data Platform. Covers admin endpoints (system,
    config, personas, auth keys, audit, knowledge, memory, connections), portal endpoints
    (assets, collections, shares, prompts, activity), and resource management.
  title: MCP Data Platform API
  version: "1.0"
paths:
  /admin/audit/events:
    get:
      description: Returns paginated audit events with optional filtering.
      parameters:
      - description: Filter by user ID
        in: query
        name: user_id
        type: string
      - description: Filter by tool name
        in: query
        name: tool_name
        type: string
      - description: Filter by MCP session ID
        in: query
        name: session_id
        type: string
      - description: Filter by success/failure
        in: query
        name: success
        type: boolean
      - description: Events after this time (RFC 3339)
        in: query
        name: start_time
        type: string
      - description: Events before this time (RFC 3339)
        in: query
        name: end_time
        type: string
      - description: 'Sort column (default: timestamp)'
        in: query
        name: sort_by
        type: string
      - description: 'Sort direction: asc, desc (default: desc)'
        in: query
        name: sort_order
        type: string
      - description: 'Page number, 1-based (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Results per page (default: 50)'
        in: query
        name: per_page
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.auditEventResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List audit events
      tags:
      - Audit
  /admin/audit/events/{id}:
    get:
      description: Returns a single audit event by ID.
      parameters:
      - description: Audit event ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.Event'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/admin.problemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get audit event
      tags:
      - Audit
  /admin/audit/events/filters:
    get:
      description: Returns unique user IDs and tool names seen in the audit log, sorted
        alphabetically.
      parameters:
      - description: Events after this time (RFC 3339)
        in: query
        name: start_time
        type: string
      - description: Events before this time (RFC 3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.auditFiltersResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get audit event filter values
      tags:
      - Audit
  /admin/audit/metrics/breakdown:
    get:
      description: Returns audit event counts grouped by a dimension.
      parameters:
      - description: 'Dimension: tool_name, user_id, persona, toolkit_kind, connection'
        in: query
        name: group_by
        required: true
        type: string
      - description: 'Max entries (default: 10, max: 100)'
        in: query
        name: limit
        type: integer
      - description: Start time (RFC 3339)
        in: query
        name: start_time
        type: string
      - description: End time (RFC 3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/audit.BreakdownEntry'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/admin.problemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get audit breakdown
      tags:
      - Audit
  /admin/audit/metrics/discovery:
    get:
      description: Returns discovery-before-query session pattern statistics.
      parameters:
      - description: Start time (RFC 3339)
        in: query
        name: start_time
        type: string
      - description: End time (RFC 3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.DiscoveryStats'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get discovery pattern metrics
      tags:
      - Audit
  /admin/audit/metrics/enrichment:
    get:
      description: Returns aggregate enrichment statistics including mode breakdown
        and token savings.
      parameters:
      - description: Start time (RFC 3339)
        in: query
        name: start_time
        type: string
      - description: End time (RFC 3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.EnrichmentStats'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get enrichment metrics
      tags:
      - Audit
  /admin/audit/metrics/overview:
    get:
      description: Returns aggregate audit statistics for the given time range.
      parameters:
      - description: Start time (RFC 3339)
        in: query
        name: start_time
        type: string
      - description: End time (RFC 3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.Overview'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get audit overview
      tags:
      - Audit
  /admin/audit/metrics/performance:
    get:
      description: Returns latency percentile statistics for the given time range.
      parameters:
      - description: Start time (RFC 3339)
        in: query
        name: start_time
        type: string
      - description: End time (RFC 3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/audit.PerformanceStats'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get audit performance
      tags:
      - Audit
  /admin/audit/metrics/timeseries:
    get:
      description: Returns audit event counts bucketed by time resolution.
      parameters:
      - description: 'Time bucket resolution: minute, hour, day (default: hour)'
        in: query
        name: resolution
        type: string
      - description: Start time (RFC 3339)
        in: query
        name: start_time
        type: string
      - description: End time (RFC 3339)
        in: query
        name: end_time
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/audit.TimeseriesBucket'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/admin.problemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Get audit timeseries
      tags:
      - Audit
  /admin/audit/stats:
    get:
      description: Returns aggregate counts for total, successful, and failed events.
        Supports time and filter parameters.
