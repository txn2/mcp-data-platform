host: localhost:8080
info:
  contact: {}
  description: REST API for the MCP Data Platform. Covers admin endpoints (system,
    config, personas, auth keys, audit, knowledge, memory, connections), portal endpoints
    (assets, collections, shares, prompts, activity), and resource management.
  title: MCP Data Platform API
  version: "1.0"
paths:
  /admin/api-catalogs:
    get:
      description: Returns all API catalogs with derived spec_count and ref_count
        fields.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/admin.catalogResponse'
            type: array
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: List API catalogs
      tags:
      - API Catalogs
    post:
      consumes:
      - application/json
      description: Creates a new API catalog. Only available in database config mode.
      parameters:
      - description: Catalog definition
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/admin.createCatalogRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/admin.catalogResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/admin.problemDetail'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/admin.problemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Create API catalog
      tags:
      - API Catalogs
  /admin/api-catalogs/{id}:
    delete:
      description: Deletes a catalog. Rejected with 409 if any connection still references
        it.
      parameters:
      - description: Catalog ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/admin.statusResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/admin.problemDetail'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/admin.problemDetail'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/admin.problemDetail'
      security:
      - ApiKeyAuth: []
      - BearerAuth: []
      summary: Delete API catalog
      tags:
      - API Catalogs
    get:
      description: Returns a single API catalog by ID with derived spec_count and
        ref_count fields.
      parameters:
      - description: Catalog ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
