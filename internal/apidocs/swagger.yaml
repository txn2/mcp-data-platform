        type: number
      call_count:
        type: integer
      success_rate:
        type: number
      window_seconds:
        type: integer
    type: object
  admin.ToolDetail:
    properties:
      activity:
        $ref: '#/definitions/admin.ToolActivityAggregate'
      connection:
        type: string
      description:
        type: string
      description_overridden:
        description: |-
          Description-override status (populated when a
          tool.<name>.description config-entry exists).
        type: boolean
      enrichment_rule_count:
        description: |-
          Number of cross-enrichment rules attached to this tool. Only
          meaningful for proxied tools (kind=mcp); zero for native.
        type: integer
      global_deny_pattern:
        type: string
      hidden_by_global_deny:
        description: |-
          HiddenByGlobalDeny is true when the platform-level tools.deny
          list matches this tool. GlobalDenyPattern is the matching glob.
        type: boolean
      hidden_by_persona:
        additionalProperties:
          type: boolean
        description: |-
          HiddenByPersona maps persona name → true for any persona where
          this tool is denied.
        type: object
      input_schema:
        description: JSON Schema for the tool's input parameters.
      name:
        type: string
      override_author:
        type: string
      personas:
        description: |-
          Persona allow/deny matrix — one entry per database-managed
          persona, with the matched pattern and source recorded.
        items:
          $ref: '#/definitions/admin.ToolPersonaAccess'
        type: array
      title:
        type: string
      toolkit_kind:
        type: string
      toolkit_name:
        type: string
