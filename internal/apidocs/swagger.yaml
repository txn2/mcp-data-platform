securityDefinitions:
  ApiKeyAuth:
    in: header
    name: X-API-Key
    type: apiKey
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"

tags:
  - name: "User"
    description: "Current user identity, roles, persona, and available tools."
  - name: "Activity"
    description: "Personal analytics for the authenticated user's tool usage. Timeseries, breakdowns, and summary statistics scoped to the calling user."
  - name: "Assets"
    description: "AI-generated artifacts — dashboards, reports, visualizations, and data exports. Supports HTML, JSX, SVG, Markdown, and CSV content types with versioning, thumbnails, and sharing."
  - name: "Collections"
    description: "Curated groups of assets organized into ordered sections with markdown descriptions. Collections support sharing via public links and user-level permissions."
  - name: "Knowledge"
    description: "Domain knowledge captured during AI sessions. Insights go through an admin review workflow before being written back to the data catalog. Includes insight statistics and governance lifecycle tracking."
  - name: "Memory"
    description: "Persistent memory records accumulated across sessions — corrections, preferences, business context, and data quality observations. Backed by PostgreSQL with pgvector for semantic search."
  - name: "Prompts"
    description: "Reusable prompt templates with argument placeholders. Users manage personal prompts and browse available global, persona, and system prompts."
  - name: "Resources"
    description: "Human-uploaded reference materials — SQL templates, runbooks, checklists, and brand assets. Scoped by visibility (global, persona, user) and accessible to AI agents via the MCP resources protocol."
  - name: "Shares"
    description: "Asset and collection sharing via public links (token-based, time-limited) and user shares (email-based with viewer/editor permissions)."
  - name: "Audit"
    description: "Platform-wide audit log of every tool call. Paginated event queries with filtering, aggregate statistics, performance percentiles, enrichment metrics, and discovery pattern analytics."
  - name: "Auth Keys"
    description: "API key management for programmatic access. Create, list, and revoke keys with role assignment and expiration. Keys from the config file are read-only."
  - name: "Config"
    description: "Platform configuration management. Read the active config, export as YAML, and manage per-key database overrides for whitelisted settings with hot-reload."
  - name: "Connections"
    description: "Toolkit connection management for Trino, DataHub, and S3 backends. View file-configured connections, create database-managed instances, and inspect connection details."
  - name: "Personas"
    description: "Role-based access control profiles that determine which tools and connections a user can access. Each persona defines allow/deny patterns, context overrides, and priority-based role mapping."
  - name: "System"
    description: "Platform identity, version, runtime feature availability, registered tools, and toolkit connections."
  - name: "Tools"
    description: "Tool schema introspection and interactive execution. Browse JSON schemas for all registered tools and execute tool calls with parameter validation."

x-tagGroups:
  - name: "User API"
    tags:
      - "User"
      - "Activity"
      - "Assets"
      - "Collections"
      - "Knowledge"
      - "Memory"
      - "Prompts"
      - "Resources"
      - "Shares"
  - name: "Admin API"
    tags:
      - "Audit"
      - "Auth Keys"
      - "Config"
      - "Connections"
      - "Personas"
      - "System"
      - "Tools"
