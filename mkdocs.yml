site_name: txn2/mcp-data-platform
site_url: https://mcp-data-platform.txn2.com
site_description: Composable, semantic-first MCP server platform composing DataHub, Trino, and S3 with cross-enrichment, OAuth 2.1, personas, and audit logging
site_author: Craig Johnston
repo_url: https://github.com/txn2/mcp-data-platform
repo_name: txn2/mcp-data-platform
edit_uri: edit/main/docs/

copyright: Copyright &copy; 2025 - 2026 Craig Johnston / Deasil Works, Inc.

theme:
  name: material
  custom_dir: docs/overrides
  logo: images/logo.png
  favicon: images/logo.png
  palette:
    scheme: slate
  font: false
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - toc.follow
    - announce.dismiss

nav:
  - Home: index.md
  - Ecosystem: ecosystem/index.md
  - Getting Started:
    - Overview: server/overview.md
    - The Data Stack: concepts/components.md
    - Installation: server/installation.md
    - Configuration: server/configuration.md
    - Deployment: server/deployment.md
  - Features:
    - Tools: server/tools.md
    - Cross-Enrichment:
      - Overview: cross-enrichment/overview.md
      - Trino to DataHub: cross-enrichment/trino-datahub.md
      - DataHub to Trino: cross-enrichment/datahub-trino.md
      - S3 Enrichment: cross-enrichment/s3.md
      - Lineage Inheritance: cross-enrichment/lineage.md
    - Multi-Provider: server/multi-provider.md
    - Authentication:
      - Overview: auth/overview.md
      - OIDC: auth/oidc.md
      - API Keys: auth/api-keys.md
      - OAuth 2.1 Server (inbound): auth/oauth-server.md
      - OAuth to Upstream MCPs (outbound): auth/oauth-gateway.md
    - Personas:
      - Overview: personas/overview.md
      - Tool Filtering: personas/tool-filtering.md
      - Role Mapping: personas/role-mapping.md
    - Knowledge Capture:
      - Overview: knowledge/overview.md
      - Governance Workflow: knowledge/governance.md
      - Admin API: knowledge/admin-api.md
    - Memory Layer:
      - Overview: memory/overview.md
      - Configuration: memory/configuration.md
    - Administration:
      - User Portal: server/portal-user.md
      - Admin Portal: server/admin-portal.md
      - Admin API: server/admin-api.md
    - Operations:
      - Audit Logging: server/audit.md
      - Operating Modes: server/operating-modes.md
      - Session Externalization: server/session-externalization.md
      - Gateway Toolkit: server/gateway.md
    - MCP Apps:
      - Overview: mcpapps/overview.md
      - Configuration: mcpapps/configuration.md
      - Development: mcpapps/development.md
      - Tutorial: mcpapps/tutorial.md
  - Go Library:
    - Overview: library/overview.md
    - Quick Start: library/quickstart.md
    - Architecture: library/architecture.md
    - Extensibility: library/extensibility.md
  - Examples:
    - Gallery: examples/index.md
  - Reference:
    - Tools API: reference/tools-api.md
    - Configuration: reference/configuration.md
    - Providers: reference/providers.md
    - Middleware: reference/middleware.md
  - Support:
    - Troubleshooting: support/troubleshooting.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/txn2/mcp-data-platform
      name: mcp-data-platform on GitHub
  generator: false

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/mermaid-fullscreen.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: txn2
      repo: mcp-data-platform
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
