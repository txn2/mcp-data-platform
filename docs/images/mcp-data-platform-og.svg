<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- canvas -->
  <rect width="1200" height="630" fill="#0B0B09"/>

  <defs>
    <radialGradient id="tint" cx="14%" cy="6%" r="55%">
      <stop offset="0%" stop-color="#FF5A1F" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#FF5A1F" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ECE3CE" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#tint)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- crosshair corners -->
  <g stroke="#5A554B" stroke-width="1">
    <line x1="40" y1="56" x2="68" y2="56"/>
    <line x1="54" y1="42" x2="54" y2="70"/>
    <line x1="1132" y1="56" x2="1160" y2="56"/>
    <line x1="1146" y1="42" x2="1146" y2="70"/>
    <line x1="40" y1="574" x2="68" y2="574"/>
    <line x1="54" y1="560" x2="54" y2="588"/>
    <line x1="1132" y1="574" x2="1160" y2="574"/>
    <line x1="1146" y1="560" x2="1146" y2="588"/>
  </g>

  <!-- top rail strip -->
  <line x1="80" y1="100" x2="1120" y2="100" stroke="#2A2922" stroke-width="1"/>
  <text x="80" y="80" fill="#ECE3CE" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="400" font-size="22">mcp-data-platform</text>
  <text x="320" y="80" fill="#968F80" font-family="JetBrains Mono, Menlo, monospace" font-size="13" letter-spacing="0.6">· composable mcp data platform</text>
  <text x="1120" y="80" fill="#FF5A1F" font-family="JetBrains Mono, Menlo, monospace" font-size="12" font-weight="700" letter-spacing="2.4" text-anchor="end">TXN2 / OPEN SOURCE</text>

  <!-- symbol mark, signal accent (extracted from the canonical banner mark) -->
  <svg x="100" y="200" width="240" height="240" viewBox="10 10 80 80" overflow="visible">
    <path fill="#ECE3CE" d="M50,83.333C31.59,83.333 16.667,68.408 16.667,50C16.667,31.588 31.591,16.667 50,16.667C68.408,16.667 83.333,31.589 83.333,50L90,50C90,27.91 72.09,10 50,10C27.909,10 10,27.91 10,50C10,72.09 27.909,90 50,90L50,83.333Z M50,70C38.954,70 30,61.045 30,50C30,38.952 38.954,30 50,30C61.045,30 70,38.952 70,50L76.667,50C76.667,35.273 64.727,23.333 50,23.333C35.272,23.333 23.333,35.273 23.333,50C23.333,64.727 35.272,76.667 50,76.667L50,70Z M50,56.667C46.318,56.667 43.333,53.682 43.333,50C43.333,46.318 46.318,43.333 50,43.333C53.682,43.333 56.667,46.318 56.667,50L63.333,50C63.333,42.637 57.363,36.667 50,36.667C42.635,36.667 36.667,42.637 36.667,50C36.667,57.363 42.635,63.333 50,63.333L50,56.667Z"/>
    <path fill="#FF5A1F" d="M56.667,56.667 H90 V90 H56.667 Z"/>
  </svg>

  <!-- typographic display, three rows. Smaller scale than sister sites
       because the project name is 17 characters; 80px keeps the title
       on one line within the 1120px right margin. -->
  <text x="400" y="270" fill="#ECE3CE" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="300" font-size="80" letter-spacing="-2">mcp-data-platform</text>

  <!-- outline row -->
  <text x="400" y="370" fill="none" stroke="#ECE3CE" stroke-width="1.2" font-family="Fraunces, Georgia, serif" font-weight="400" font-size="68" letter-spacing="-1.5">semantic platform</text>

  <text x="400" y="470" fill="#ECE3CE" font-family="Fraunces, Georgia, serif" font-style="italic" font-weight="300" font-size="68" letter-spacing="-1.5">for ai.</text>

  <!-- bottom strip -->
  <line x1="80" y1="538" x2="1120" y2="538" stroke="#2A2922" stroke-width="1"/>

  <line x1="80" y1="560" x2="80" y2="590" stroke="#FF5A1F" stroke-width="2"/>
  <text x="100" y="582" fill="#C9C0AB" font-family="JetBrains Mono, Menlo, monospace" font-size="13" letter-spacing="1.8">APACHE 2.0  ·  COMPOSABLE MCP PLATFORM  ·  GO  ·  SEMANTIC FIRST</text>

  <text x="1120" y="582" fill="#FF5A1F" font-family="JetBrains Mono, Menlo, monospace" font-size="14" font-weight="700" letter-spacing="2.2" text-anchor="end">MCP-DATA-PLATFORM.TXN2.COM  ↗</text>
